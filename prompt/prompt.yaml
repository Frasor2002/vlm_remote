prompt: |
  GOAL:
    Analyze the provided image and its corresponding saliency map to identify potential confounders. 
    The model predicted the image as a {prediction}.
    The true label for this image is {label}.

  INPUT:
    You are provided:
    - the sample image
    - the saliency map in a colormap with red colors meaning stronger activation and blue meaning weaker activation.


  INSTRUCTIONS:
    1. EXPLANATION: Examine the saliency map to see which regions the model focuses on. Explain whether these highlighted regions correspond to the actual object of interest or to confounders.
    2. BOUNDING BOXES: Locate the exact areas of the identified confounders. Do not guess or assume information not visible in the image.

  OUTPUT FORMAT:
    Provide your explanation first, followed strictly by a JSON block containing the bounding box coordinates [xmin, ymin, xmax, ymax] for each confounder.
    The image is {img_len} X {img_len} so the bounding box should be correct, precise and within the bounds of the image.

    Explanation:
    [Your concise explanation of the saliency map and identified confounders here]

    JSON:
    ```json
    [
      {
        "bbox": [xmin, ymin, xmax, ymax]
      }
    ]